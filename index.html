<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"/>
    <link rel="stylesheet" href="src/css/output.css">
</head>
<body>
<nav class="bg-red-800 fixed w-full z-20 top-0 inset-s-0 border-b border-default">
<div class="max-w-screen-xl flex flex-wrap items-center justify-between mx-auto p-4">
<div class="flex items-center gap-4">
<i class="text-white fa-solid fa-table-columns text-2xl"></i>
<h1 class="text-white text-xl font-bold tracking-tight">Kanban</h1>    
</div>
<div>
<button id="add-btn" class="w-10 h-10 rounded-lg bg-white/20 hover:bg-white/30 transition-colors flex items-center justify-center"><i class="text-white fa-solid fa-plus"></i></button>
</div>
</div>
</nav>
<div id="modal-overlay" class="hidden fixed inset-0 bg-black/50 z-50 p-4 flex items-center justify-center">
<!-- Modal Content -->
  <div id="task-modal" class="bg-white rounded-2xl shadow-xl w-full max-w-lg max-h-[90vh] overflow-y-auto transform transition-all">
          <div class="flex items-center justify-between p-5 border-b border-slate-200">
            <h2 id="modal-title" class="text-lg font-semibold text-slate-800 flex items-center gap-2">
              <i id="modal-icon" class="fa-solid fa-plus-circle text-red-600"></i>
              Create New Task
            </h2>
            <button id="close-modal-btn" class="w-8 h-8 rounded-lg hover:bg-slate-100 flex items-center justify-center text-slate-400 hover:text-slate-600 transition-colors">
              <i class="fa-solid fa-xmark text-lg"></i>
            </button>
          </div>
          <form id="task-form" class="p-5" novalidate="">
            <div class="mb-4">
              <label for="task-title" class="flex items-center gap-2 text-sm font-medium text-slate-700 mb-2">
                <i class="fa-solid fa-heading text-slate-400"></i>
                Task Title <span class="text-red-500">*</span>
              </label>
              <input type="text" id="task-title" name="title" placeholder="What needs to be done?" autocomplete="off" class="w-full px-4 py-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-red-700 focus:border-red-700 outline-none transition-all placeholder:text-slate-400">
              <p id="title-error" class="text-red-500 text-xs mt-1 hidden">Task title is required</p>
            </div>
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-4">
              <div>
                <label for="task-priority" class="flex items-center gap-2 text-sm font-medium text-slate-700 mb-2">
                  <i class="fa-solid fa-flag text-slate-400"></i>
                  Priority
                </label>
                <select id="task-priority" name="priority" class=" w-full px-4 py-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-red-700 focus:border-red-700 outline-none transition-all bg-white cursor-pointer">
                  <option value="low">Low</option>
                  <option value="medium" selected="">Medium</option>
                  <option value="high">High</option>
                </select>
              </div>
              <div>
                <label for="task-due-date" class="flex items-center gap-2 text-sm font-medium text-slate-700 mb-2">
                  <i class="fa-regular fa-calendar text-slate-400"></i>
                  Due Date
                </label>
                <input type="date" id="task-due-date" name="dueDate" class="w-full px-4 py-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-red-700 focus:border-ring-red-700 outline-none transition-all">
                <p id="date-error" class="text-red-500 text-xs mt-1 hidden"></p>
              </div>
            </div>
            <div class="mb-5">
              <label for="task-description" class="flex items-center gap-2 text-sm font-medium text-slate-700 mb-2">
                <i class="fa-solid fa-align-left text-slate-400"></i>
                Description
              </label>
              <textarea id="task-description" name="description" placeholder="Add more details about this task..." rows="3" maxlength="500" class="w-full px-4 py-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-red-700 focus:border-red-700 outline-none transition-all resize-none placeholder:text-slate-400"></textarea>
              <div class="flex justify-between items-center mt-1">
                <p id="description-error" class="text-red-500 text-xs hidden"></p>
                <p id="char-count" class="text-slate-400 text-xs ml-auto">0/500</p>
              </div>
            </div>
            <div class="flex gap-3">
              <button type="button" id="cancel-btn" class="flex-1 bg-slate-100 hover:bg-slate-200 text-slate-700 font-medium py-2.5 px-4 rounded-lg transition-colors">
                Cancel
              </button>
              <button type="submit" id="submit-btn" class="flex-1 bg-red-900 hover:bg-red-800 text-white font-medium py-2.5 px-4 rounded-lg transition-colors flex items-center justify-center gap-2">
                <i class="fa-solid fa-plus"></i>
                <span id="submit-btn-text">Add Task</span>
              </button>
              <button  type="button" id="submittt-btn" class="hidden flex-1 bg-red-900 hover:bg-red-800 text-white font-medium py-2.5 px-4 rounded-lg transition-colors flex items-center justify-center gap-2">
                <i class="fa-solid fa-save"></i>
                <span id="submit-btn-text">Save Changes</span>
              </button>
            </div>
          </form>
  </div>
</div>
<main class="mt-20 flex-1 px-4 py-8 bg-linear-to-br from-slate-100 via-slate-50 to-indigo-50/30">
  <div id="columns-container" class="max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-3 gap-6"> 
    <div id="todo"class="bg-white/60 backdrop-blur-sm rounded-2xl p-5 flex flex-col min-h-[500px] border border-slate-200/50 shadow-sm">
      <div class="flex items-center gap-3 mb-5">
        <div class="w-10 h-10 bg-slate-100 rounded-xl flex items-center justify-center">
          <i class="fa-solid fa-clipboard-list text-slate-500 text-lg"></i>
        </div>
        <div class="flex-1">
          <h2 class="font-semibold text-slate-800">To Do</h2>
          <p id="todo-count" class="text-xs text-slate-400">0 tasks</p>
        </div>
      </div>
      <!-- <div class="flex-1 flex flex-col gap-4 overflow-y-auto pr-1 -mr-1" id="tasks-in-progress">
        <div class="flex flex-col items-center justify-center py-12 text-slate-400">
          <i class="fa-regular fa-folder-open text-4xl mb-3 opacity-50"></i>
          <p class="text-sm">No tasks yet</p>
          <p class="text-xs mt-1">Click + to add one</p>
        </div>
      </div> -->
      <div class="flex-1 flex flex-col gap-4 overflow-y-auto pr-1 -mr-1" id="tasks-todo">

      </div>
    </div>
    <div id="in-progress" class="bg-white/60 backdrop-blur-sm rounded-2xl p-5 flex flex-col min-h-125 border border-slate-200/50 shadow-sm">
      <div class="flex items-center gap-3 mb-5">
        <div class="w-10 h-10 bg-amber-50 rounded-xl flex items-center justify-center">
          <i class="fa-solid fa-spinner text-amber-500 text-lg"></i>
        </div>
        <div class="flex-1">
          <h2 class="font-semibold text-slate-800">In Progress</h2>
          <p id="progress-count" class="text-xs text-slate-400">0 tasks</p>
        </div>
      </div>
      <div class="flex-1 flex flex-col gap-4 overflow-y-auto pr-1 -mr-1" id="tasks-in-progress">
        <div class="flex flex-col items-center justify-center py-12 text-slate-400">
              <i class="fa-regular fa-folder-open text-4xl mb-3 opacity-50"></i>
              <p class="text-sm">No tasks yet</p>
              <p class="text-xs mt-1">Click + to add one</p>
            </div>
      </div>
    </div>
    <div id="completed" class="bg-white/60 backdrop-blur-sm rounded-2xl p-5 flex flex-col min-h-125 border border-slate-200/50 shadow-sm">
       <div class="flex items-center gap-3 mb-5">
        <div class="w-10 h-10 bg-emerald-50 rounded-xl flex items-center justify-center">
          <i class="fa-solid fa-circle-check text-emerald-500 text-lg"></i>
        </div>
        <div class="flex-1">
          <h2 class="font-semibold text-slate-800">Completed</h2>
          <p  id="completed-count" class="text-xs text-slate-400">0 tasks</p>
        </div>
      </div>
      <div class="flex-1 flex flex-col gap-4 overflow-y-auto pr-1 -mr-1" id="tasks-completed">
        <div class="flex flex-col items-center justify-center py-12 text-slate-400">
              <i class="fa-regular fa-folder-open text-4xl mb-3 opacity-50"></i>
              <p class="text-sm">No tasks yet</p>
              <p class="text-xs mt-1">Click + to add one</p>
            </div>
      </div>
    </div>
  </div>
</main>
<footer class="bg-red-900 text-center py-5 mt-auto border-t border-slate-700/50">
        <p class="text-white text-sm flex items-center justify-center gap-2">
          Made with <i class="fa-solid fa-heart text-rose-300 animate-pulse"></i> by omnia
        </p>
      </footer>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script type="module" src="src/js/main.js"></script>
</body>
</html>
